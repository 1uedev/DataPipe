// Runtime registration protocol (ARC-210, ADR-007): runtimes dial the
// control plane and register themselves; this is the walking-skeleton
// slice of the eventual deploy/status/debug streams.
syntax = "proto3";

package datapipe.runtime.v1;

option go_package = "github.com/1uedev/DataPipe/proto/gen/go/datapipe/runtime/v1;runtimev1";

// RuntimeRegistry is implemented by the control plane. Runtimes (server or
// edge) are the gRPC clients and always initiate the connection.
service RuntimeRegistryService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // DeployStream is opened by the runtime once, after Register, and kept
  // open for the runtime's lifetime: the control plane pushes one response
  // per deploy as REST API deploys happen (Increment 3, ARC-210/ADR-007
  // "streams for: deploy commands, flow status, health").
  rpc DeployStream(DeployStreamRequest) returns (stream DeployStreamResponse);

  // DebugChannel is opened by the runtime once, after Register, and kept
  // open for the runtime's lifetime (Increment 5, DBG-100/110/120/170): the
  // runtime pushes sampled per-node debug events and periodic wire-metric
  // snapshots for flows the control plane has subscribed to; the control
  // plane pushes subscribe/unsubscribe requests down the same stream so a
  // runtime never captures or sends data for a flow nobody is watching.
  rpc DebugChannel(stream DebugChannelRequest) returns (stream DebugChannelResponse);

  // ResolveConnection is called by a runtime whenever a connector node
  // needs the connection it references (Increment 6, CON-110/SEC-120): the
  // control plane looks up the connection's non-secret config and, if it
  // references a credential, decrypts it — the decrypted value is only ever
  // sent here, to the runtime that needs it to actually connect, never
  // embedded in a deploy push or any flow export.
  rpc ResolveConnection(ResolveConnectionRequest) returns (ResolveConnectionResponse);

  // EventChannel is opened by the runtime once, after Register, and kept
  // open for the runtime's lifetime (Increment 8, ENG-130/DBG-140/ERR-130):
  // the runtime durably reports every triggered-execution lifecycle event
  // and every dead-lettered datagram; the control plane persists them and
  // pushes re-run/cancel/re-inject commands down the same stream. Unlike
  // DebugChannel this is never sampled or rate-limited (DBG-140 "every
  // execution recorded") and is not gated by a subscribe/unsubscribe
  // handshake — the control plane always wants every triggered-flow event.
  rpc EventChannel(stream EventChannelRequest) returns (stream EventChannelResponse);
}

enum RuntimeKind {
  RUNTIME_KIND_UNSPECIFIED = 0;
  RUNTIME_KIND_SERVER = 1;
  RUNTIME_KIND_EDGE = 2;
}

message RegisterRequest {
  string runtime_id = 1;
  RuntimeKind kind = 2;
  string version = 3;
  // enrollment_token authenticates this runtime as a managed fleet device
  // (Increment 9, EDGE-120/ARC-210 "per-device credentials"): presented on
  // every Register call (not just the first), checked against a hash
  // stored control-plane-side. Empty is accepted for the walking-skeleton
  // no-token local/dev setup (backward compatible); once a runtime_id has
  // been enrolled with a token, subsequent Register calls for that same
  // runtime_id must present a token that hashes to the same enrollment.
  string enrollment_token = 4;
}

message RegisterResponse {
  bool accepted = 1;
  string session_token = 2;
}

// FlowStatus is one deployed flow's coarse health, reported on every
// Heartbeat for fleet inventory (EDGE-120 "flow status").
message FlowStatus {
  string flow_id = 1;
  string status = 2; // "running" | "error"
}

message HeartbeatRequest {
  string runtime_id = 1;
  string session_token = 2;
  // Fleet health snapshot (Increment 9, EDGE-120 "inventory with health
  // (online, CPU, memory, flow status, versions)"). All optional/best
  // effort — a runtime that can't sample CPU still heartbeats.
  double cpu_percent = 3;
  uint64 memory_bytes = 4;
  repeated FlowStatus flow_statuses = 5;
}

message HeartbeatResponse {
  bool ok = 1;
}

message DeployStreamRequest {
  string runtime_id = 1;
  string session_token = 2;
}

// DeployStreamResponse carries one flow's canonical JSON
// (Flow-File-Format.md) for the runtime to validate and apply via its
// local flow.Deployment.
message DeployStreamResponse {
  string flow_id = 1;
  int64 version = 2;
  string flow_json = 3;
  // default_error_flow is the owning project's ERR-120 fallback
  // error-handler flow id (Increment 8), applied via
  // flow.Deployment.SetDefaultErrorFlow when the flow itself has no
  // settings.errorFlow of its own. "" if the project has none configured.
  string default_error_flow = 4;
}

// DebugChannelRequest is one message the runtime pushes on the DebugChannel:
// either a single node/wire debug event or a periodic wire-metrics snapshot.
message DebugChannelRequest {
  string runtime_id = 1;
  string session_token = 2;
  oneof payload {
    DebugEvent event = 3;
    WireMetricsSnapshot wire_metrics = 4;
  }
}

// DebugEvent carries one datagram observed at a node's input, output, or a
// named debug/sidebar node (DBG-100/110). value_json is the full-fidelity
// JSON encoding of the observed payload; the control plane truncates its own
// copy before relaying to browsers (DBG-110 "load full on demand") — the
// runtime always sends full fidelity since this channel is already sampled
// (DBG-170).
message DebugEvent {
  string id = 1;
  string flow_id = 2;
  string node_id = 3;
  string port = 4;
  string direction = 5; // "in" | "out" | "sidebar"
  string label = 6;
  int64 time_unix_ms = 7;
  string datagram_id = 8;
  string correlation_id = 9;
  string causation_id = 10;
  string quality = 11;
  string value_json = 12;
}

// WireMetricsSnapshot reports a wire's cumulative delivered/dropped counts
// (BUS-110) for DBG-120's live counters/rates; sent periodically (not per
// datagram) so it stays cheap at any throughput.
message WireMetricsSnapshot {
  string flow_id = 1;
  string from_node = 2;
  string from_port = 3;
  string to_node = 4;
  string to_port = 5;
  uint64 delivered = 6;
  uint64 dropped = 7;
}

// DebugChannelResponse is one message the control plane pushes on the
// DebugChannel: a subscribe/unsubscribe request naming the flow a browser
// client wants to inspect. The runtime only captures/forwards live events
// for subscribed flows (DBG-170: "sampled/rate-limited to protect the
// runtime").
message DebugChannelResponse {
  oneof payload {
    SubscribeFlow subscribe = 1;
    UnsubscribeFlow unsubscribe = 2;
  }
}

message SubscribeFlow {
  string flow_id = 1;
}

message UnsubscribeFlow {
  string flow_id = 1;
}

message ResolveConnectionRequest {
  string runtime_id = 1;
  string session_token = 2;
  string connection_id = 3;
}

// ResolveConnectionResponse carries a connection's type and non-secret
// config always; credential_json is the decrypted credential value
// (JSON-encoded) if the connection references one, otherwise empty.
message ResolveConnectionResponse {
  string type = 1;
  string config_json = 2;
  string credential_json = 3;
}

// EventChannelRequest is one message the runtime pushes on the
// EventChannel: either a triggered-execution lifecycle event or a
// dead-lettered datagram. Never sampled/dropped (unlike DebugChannel).
message EventChannelRequest {
  string runtime_id = 1;
  string session_token = 2;
  oneof payload {
    ExecutionEvent execution_event = 3;
    DeadLetterEvent dead_letter_event = 4;
  }
}

// ExecutionEvent reports one moment in a tracked execution's lifecycle
// (ENG-130/DBG-140): the trigger firing ("started"), one node's
// input/output/error ("node"), or the execution reaching a terminal status
// ("finished"). A flat message (like DebugEvent) rather than a nested
// oneof, with phase-specific fields populated only for the relevant phase.
message ExecutionEvent {
  string execution_id = 1;  // the root datagram's correlationId (DGM-160)
  string flow_id = 2;
  string phase = 3;  // "started" | "node" | "finished"
  int64 time_unix_ms = 4;

  // phase == "started"
  string trigger_node_id = 5;
  string trigger_kind = 6;   // e.g. "webhook" | "rerun"
  string re_run_of = 7;      // execution id this replays, if any
  string seed_datagram_json = 8;

  // phase == "node"
  string node_id = 9;
  string port = 10;
  int32 attempt = 11;
  int64 duration_us = 12;
  string input_json = 13;
  string outputs_json = 14;  // JSON array of {port, datagram}
  string error_message = 15;
  string error_code = 16;
  string error_stack = 17;

  // phase == "finished"
  string status = 18;  // success | failed | cancelled | crashed
  string reason = 19;
}

// DeadLetterEvent reports one dead-lettered datagram (ERR-130): a node
// error that resolved to "fail"/"discard", or a TTL-expired datagram.
message DeadLetterEvent {
  string id = 1;
  string flow_id = 2;
  string node_id = 3;
  string port = 4;
  string reason = 5;  // e.g. "node_error" | "ttl_expired"
  string datagram_json = 6;
  int64 time_unix_ms = 7;
}

// EventChannelResponse is one message the control plane pushes on the
// EventChannel: a command to re-run an execution, cancel one, or re-inject
// a dead letter.
message EventChannelResponse {
  oneof payload {
    RunExecution run_execution = 1;
    CancelExecution cancel_execution = 2;
    ReinjectDeadLetter reinject_dead_letter = 3;
  }
}

// RunExecution asks the runtime to replay a previously recorded datagram
// through the live deployment, starting a new tracked execution. For
// from == "start" it is fanned out to (node_id, port)'s current downstream
// targets (mirroring the trigger's original emission); for from == "node"
// it is delivered directly into (node_id, port)'s own inbox (re-running
// that node and everything downstream of it).
message RunExecution {
  string flow_id = 1;
  string from = 2;  // "start" | "node"
  string node_id = 3;
  string port = 4;
  string datagram_json = 5;
  string re_run_of = 6;
}

message CancelExecution {
  string execution_id = 1;
}

// ReinjectDeadLetter asks the runtime to deliver a previously dead-lettered
// datagram back into the node that dead-lettered it (ERR-130), as if it had
// just arrived normally.
message ReinjectDeadLetter {
  string flow_id = 1;
  string node_id = 2;
  string port = 3;
  string datagram_json = 4;
}
