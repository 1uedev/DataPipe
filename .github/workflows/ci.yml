name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            proto/gen/go/go.sum
            engine/go.sum
            controlplane/go.sum
      - uses: bufbuild/buf-setup-action@v1
      - name: install protoc-gen-go / protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: buf lint
        run: buf lint
        working-directory: proto
      - name: buf generate (check for drift)
        run: |
          buf generate
          git diff --exit-code -- gen
        working-directory: proto

  go:
    runs-on: ubuntu-latest
    needs: proto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            proto/gen/go/go.sum
            engine/go.sum
            controlplane/go.sum
      - name: Build
        run: go build ./engine/... ./controlplane/... ./cli/... ./sdk/...
      - name: Vet
        run: |
          for m in proto/gen/go engine controlplane cli sdk tests; do
            (cd "$m" && go vet ./...)
          done
      - name: Test
        run: |
          for m in engine controlplane cli sdk tests; do
            (cd "$m" && go test -race ./...)
          done
      - name: Bench (report only; regression gate activates at Increment 6)
        run: cd tests && go test -run '^$' -bench . ./bench/...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: ./engine/... ./controlplane/... ./cli/... ./sdk/... ./tests/...

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        working-directory: ui
      - run: pnpm run test
        working-directory: ui
      - run: pnpm run build
        working-directory: ui

  compose-smoke-test:
    runs-on: ubuntu-latest
    needs: [go, ui]
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose -f deploy/docker-compose.yml build
      - name: docker compose up
        run: docker compose -f deploy/docker-compose.yml up -d
      - name: wait for health
        run: |
          for svc in postgres controlplane runtime; do
            for i in $(seq 1 30); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "deploy-${svc}-1" 2>/dev/null || echo "starting")
              [ "$status" = "healthy" ] && break
              sleep 2
            done
            [ "$status" = "healthy" ] || { echo "$svc did not become healthy"; docker compose -f deploy/docker-compose.yml logs; exit 1; }
          done
      - name: control plane health endpoint
        run: curl -sf http://localhost:8080/healthz
      - name: runtime health endpoint
        run: curl -sf http://localhost:8082/healthz
      - name: dump logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs
      - name: teardown
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
