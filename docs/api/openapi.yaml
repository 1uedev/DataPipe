openapi: 3.0.3
info:
  title: DataPipe Control Plane API
  version: "1"
  description: >
    Increment 3 (Development-Plan.md): projects, flows CRUD + deploy +
    immutable version history (VCS-110), connections + write-only encrypted
    credentials (SEC-120), local-user auth + RBAC (SEC-100/110), audit log
    (SEC-140). Everything the editor UI will ever do goes through this API
    (ARC-110) — no UI-only backdoor.
servers:
  - url: /api/v1

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Authenticate with a local account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expiresAt: { type: string, format: date-time }
        "401": { description: Invalid credentials }

  /auth/logout:
    post:
      summary: Revoke the current session
      responses:
        "204": { description: Logged out }

  /auth/me:
    get:
      summary: Current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /users:
    get:
      summary: List users (System Admin only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a user (System Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
                systemRole: { type: string, enum: [none, system_admin], default: none }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /projects:
    get:
      summary: List projects visible to the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Project" }
    post:
      summary: Create a project (creator becomes Project Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }

  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      summary: Get a project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update a project (Project Admin+)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                defaultErrorFlow: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Delete a project (Project Admin+)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /projects/{projectId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: userId
        in: path
        required: true
        schema: { type: string }
    put:
      summary: Set a user's role on this project (Project Admin+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { $ref: "#/components/schemas/ProjectRole" }
      responses:
        "200": { description: OK }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Remove a user from this project (Project Admin+)
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }

  /projects/{projectId}/flows:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      summary: List flows in a project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flow" }
    post:
      summary: Create a flow (Editor+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, content]
              properties:
                name: { type: string }
                content:
                  description: A Flow-File-Format.md flow document (draft).
                  type: object
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}:
    parameters:
      - $ref: "#/components/parameters/FlowId"
    get:
      summary: Get a flow (current draft + deployed version pointer)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update the flow's draft content (Editor+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                content: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Delete a flow (Editor+)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/deploy:
    parameters:
      - $ref: "#/components/parameters/FlowId"
    post:
      summary: >
        Validate the current draft, create an immutable version (VCS-110),
        and push it to the flow's assigned runtime.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        "201":
          description: Deployed; the new version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowVersion" }
        "400": { description: Flow file failed validation }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: No runtime currently connected to deploy to }

  /flows/{flowId}/log-level:
    parameters:
      - $ref: "#/components/parameters/FlowId"
    patch:
      summary: >
        Set OBS-120's per-flow log level (Editor+). Persisted outside the
        flow's versioned content — never bumps the flow's version. If the
        flow is currently deployed, its unchanged deployed content is
        re-pushed with the new level so a connected runtime picks it up
        immediately, without restarting any node (ENG-140).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [level]
              properties:
                level: { type: string, enum: [debug, info, warn, error] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }
        "400": { description: Unknown level }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/versions:
    parameters:
      - $ref: "#/components/parameters/FlowId"
    get:
      summary: List immutable versions (VCS-110), newest first
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FlowVersion" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/versions/{version}:
    parameters:
      - $ref: "#/components/parameters/FlowId"
      - name: version
        in: path
        required: true
        schema: { type: integer }
    get:
      summary: Get one immutable version
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowVersion" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /flows/{flowId}/versions/{version}/rollback:
    parameters:
      - $ref: "#/components/parameters/FlowId"
      - name: version
        in: path
        required: true
        schema: { type: integer }
    post:
      summary: >
        Roll back to an older version's content: copies it into the draft
        and immediately deploys it as a brand-new version (one-click
        rollback "as a new version", VCS-110) — never rewrites history.
      responses:
        "201":
          description: The new version created by the rollback
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowVersion" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /projects/{projectId}/connections:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      summary: List connections in a project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Connection" }
    post:
      summary: Create a connection (Editor+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, config]
              properties:
                name: { type: string }
                type: { type: string, description: "e.g. opcua, mqtt, sql-postgres" }
                config:
                  type: object
                  description: Non-secret connection settings only.
                credentialId:
                  type: string
                  description: Reference to a previously created credential; never a secret value.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /connections/{connectionId}:
    parameters:
      - name: connectionId
        in: path
        required: true
        schema: { type: string }
    patch:
      summary: Update a connection (Editor+)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                config: { type: object }
                credentialId: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Delete a connection (Editor+)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /connections/{connectionId}/test:
    parameters:
      - name: connectionId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: >
        CON-140 "test connection": the control plane decrypts the
        connection's credential server-side and attempts a real, bounded
        connectivity check (currently mqtt and postgres; other types
        report success with an explanatory message). The decrypted
        credential is never returned in the response (SEC-120).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectionTestResult" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /projects/{projectId}/credentials:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      summary: List credentials (metadata only — values are write-only, SEC-120)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CredentialMeta" }
    post:
      summary: Create a credential (Editor+); the value is never returned again
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, value]
              properties:
                name: { type: string }
                value:
                  type: object
                  description: Secret payload (e.g. {"username":"...","password":"..."}); encrypted at rest, never echoed back.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CredentialMeta" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /credentials/{credentialId}:
    parameters:
      - name: credentialId
        in: path
        required: true
        schema: { type: string }
    delete:
      summary: Delete a credential (Editor+)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /runtimes:
    get:
      summary: >
        List currently registered runtimes (Increment 9 fleet inventory):
        online/health/group/enrollment status alongside the basic identity
        fields from earlier increments.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Runtime" }

  /runtimes/{runtimeId}:
    parameters:
      - name: runtimeId
        in: path
        required: true
        schema: { type: string }
    patch:
      summary: Rename a runtime or (re)assign its fleet group (System Admin, EDGE-120/UI-220)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                group: { type: string, nullable: true, description: "Runtime group name, or null to unassign" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Runtime" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Unknown runtime }

  /runtime-groups:
    get:
      summary: List fleet runtime groups (EDGE-120)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuntimeGroup" }
    post:
      summary: Create a runtime group (System Admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeGroup" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /runtime-groups/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    delete:
      summary: Delete a runtime group (System Admin); member devices become unassigned
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /runtime-enroll-tokens:
    get:
      summary: List enrollment tokens (System Admin); never returns the plaintext token again
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuntimeEnrollToken" }
    post:
      summary: >
        Issue a new enrollment token (System Admin, EDGE-120/ARC-210
        per-device credential): the plaintext token is returned exactly
        once, here, in the response — only its hash is ever stored.
        Configure a runtime with `RUNTIME_ENROLL_TOKEN` to have it
        authenticate as a managed fleet device on every Register call.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                group: { type: string, description: "Runtime group new devices using this token are enrolled into" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RuntimeEnrollToken"
                  - type: object
                    properties:
                      token: { type: string, description: "Plaintext — shown once" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /runtime-enroll-tokens/{tokenId}:
    parameters:
      - name: tokenId
        in: path
        required: true
        schema: { type: string }
    delete:
      summary: Revoke an enrollment token (System Admin); already-enrolled devices are unaffected
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /alert-rules:
    get:
      summary: List OBS-140 alert rules (any authenticated user)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AlertRule" }
    post:
      summary: >
        Create an alert rule (System Admin). "edgeOffline" fires when any
        runtime is offline; "connectionDown" fires when targetRuntimeId
        specifically is offline. Evaluated against the registry's live
        Online tracking every 15s (ARC-210 outbound-only architecture means
        this can only use data the control plane already has centrally —
        not a fresh per-runtime metrics pull).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, metric]
              properties:
                name: { type: string }
                metric: { type: string, enum: [connectionDown, edgeOffline] }
                targetRuntimeId: { type: string, description: "Required when metric is connectionDown" }
                webhookUrl: { type: string, description: "Optional HTTP POST notification target" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertRule" }
        "400": { description: Invalid metric or missing targetRuntimeId }
        "403": { $ref: "#/components/responses/Forbidden" }

  /alert-rules/{ruleId}:
    parameters:
      - name: ruleId
        in: path
        required: true
        schema: { type: string }
    delete:
      summary: Delete an alert rule (System Admin)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /alerts:
    get:
      summary: List fired alerts (firing and resolved), newest first (any authenticated user)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Alert" }

  /backup:
    get:
      summary: >
        Export a consistent snapshot of all configuration (System Admin,
        OBS-150): users, projects, flows + versions, connections,
        credentials (already envelope-encrypted at rest — SEC-120; the
        bundle carries only sealed ciphertext, never a decrypted value),
        fleet (runtime groups/enrollment tokens/devices), and alert rules.
        Deliberately excludes sessions, the audit log, and
        operational/debug history (executions, dead letters, debug pins,
        fired alert instances) — see docs/Admin-Guide.md's restore
        procedure for the full rationale. Scheduled backups are not
        implemented (SHOULD, P2).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupBundle" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /backup/restore:
    post:
      summary: >
        Restore a previously exported bundle (System Admin). Destructive:
        replaces ALL current configuration (and clears dependent
        operational tables) with the bundle's contents — not a merge. The
        caller's own session is deleted as a side effect of replacing the
        users table; log in again afterward. A credential restored under a
        different DATAPIPE_MASTER_KEY than the one that sealed it becomes
        permanently unreadable. Requires "confirm": true to guard against
        an accidental call.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [confirm, bundle]
              properties:
                confirm: { type: boolean }
                bundle: { $ref: "#/components/schemas/BackupBundle" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  restored: { type: boolean }
        "400": { description: Missing "confirm" or invalid body }
        "403": { $ref: "#/components/responses/Forbidden" }

  /audit-log:
    get:
      summary: Read the tamper-evident audit log (System/Project Admin)
      parameters:
        - name: projectId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEntry" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /ws/debug:
    get:
      summary: >
        Live debugging WebSocket (Increment 5, DBG-100/110/120/170). Full
        message protocol in docs/api/debug-websocket.md — not a normal
        REST exchange, documented here only so the endpoint appears in the
        contract.
      parameters:
        - name: flowId
          in: query
          required: true
          schema: { type: string }
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: Session token, passed as a query param because the WebSocket handshake can't carry an Authorization header.
      responses:
        "101": { description: Switching Protocols }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/nodes/{nodeId}/execute:
    post:
      summary: >
        Design-time single-node execution (DBG-130): run one Processor node
        type from the flow's current draft against a pinned/sample input,
        without touching a live deployment.
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - name: nodeId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  description: The datagram payload value to run the node against.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecuteNodeResult" }
        "400": { description: Unknown node id, or the node type is a Source (out of scope for design-time execution) }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/nodes/{nodeId}/preview:
    post:
      summary: >
        MAP-110 "fetch sample now": run one Source node type from the
        flow's current draft in isolation, collecting up to a bounded
        number of emitted datagrams (or until a timeout), without
        deploying the flow.
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - name: nodeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreviewResult" }
        "400": { description: Unknown node id, or the node type is not a Source }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/debug/pins:
    get:
      summary: List every pinned sample (DBG-130) for a flow.
      parameters:
        - $ref: "#/components/parameters/FlowId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DebugPin" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/nodes/{nodeId}/pins/{port}:
    put:
      summary: Pin a captured sample value to a node's output port (DBG-130).
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - name: nodeId
          in: path
          required: true
          schema: { type: string }
        - name: port
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DebugPin" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Remove a pinned sample.
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - name: nodeId
          in: path
          required: true
          schema: { type: string }
        - name: port
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flows/{flowId}/debug/events/{eventId}:
    get:
      summary: Fetch a debug event's untruncated payload (DBG-110 "load full on demand").
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  valueJson: { type: string }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /node-types:
    get:
      summary: >
        List registered node types (Increment 4: the editor's palette,
        UI-110, and its generated config forms, UI-170, are both driven by
        this — never hand-built per node type).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NodeType" }

  /flows/{flowId}/executions:
    get:
      summary: >
        DBG-140 execution history: list tracked executions for a triggered
        flow, newest first.
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - name: status
          in: query
          description: Filter by status.
          schema: { $ref: "#/components/schemas/ExecutionStatus" }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Execution" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /executions/{executionId}:
    parameters:
      - $ref: "#/components/parameters/ExecutionId"
    get:
      summary: Get one execution with its full per-node input/output trace.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutionDetail" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /executions/{executionId}/rerun:
    parameters:
      - $ref: "#/components/parameters/ExecutionId"
    post:
      summary: >
        DBG-140 re-run: replay this execution's recorded data either from
        the trigger node ("start") or from a specific node using its
        recorded input ("node"), starting a new tracked execution
        (Operator+).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from]
              properties:
                from: { type: string, enum: [start, node] }
                nodeId:
                  type: string
                  description: Required when from == "node".
      responses:
        "202":
          description: >
            Re-run command accepted and queued for the runtime; the new
            execution's id is not known synchronously (it is generated by
            the runtime when the trigger fires) — poll GET
            /flows/{flowId}/executions to find it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncAccepted" }
        "400": { description: Unknown node id, or no runtime currently connected }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /executions/{executionId}/cancel:
    parameters:
      - $ref: "#/components/parameters/ExecutionId"
    post:
      summary: >
        ENG-130 cancellation: request cancellation of a running execution
        (Operator+). Does not forcibly interrupt in-flight node processing
        (documented limitation); marks the execution cancelled and frees
        its concurrency slot.
      responses:
        "202":
          description: Cancellation requested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncAccepted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /flows/{flowId}/dead-letters:
    get:
      summary: ERR-130 dead letter browsing for one flow, newest first.
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeadLetter" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dead-letters/{deadLetterId}:
    parameters:
      - name: deadLetterId
        in: path
        required: true
        schema: { type: string }
    delete:
      summary: Discard a dead letter (Operator+).
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dead-letters/{deadLetterId}/reinject:
    parameters:
      - name: deadLetterId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: >
        ERR-130 re-injection: send the dead-lettered datagram back into the
        node that dead-lettered it, after the underlying issue is fixed
        (Operator+).
      responses:
        "202":
          description: Re-injection accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AsyncAccepted" }
        "400": { description: The runtime that owns this flow is not connected }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque session token from POST /auth/login.

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string }
    FlowId:
      name: flowId
      in: path
      required: true
      schema: { type: string }
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema: { type: string }

  responses:
    Forbidden:
      description: Caller's role does not permit this action
    NotFound:
      description: Resource does not exist (or is invisible to this caller)

  schemas:
    ProjectRole:
      type: string
      enum: [viewer, operator, editor, project_admin]

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        systemRole: { type: string, enum: [none, system_admin] }
        createdAt: { type: string, format: date-time }

    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        defaultErrorFlow:
          type: string
          nullable: true
          description: ERR-120 project-wide default error-handler flow id, used when a flow has no settings.errorFlow of its own.
        createdAt: { type: string, format: date-time }

    Flow:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        name: { type: string }
        content:
          type: object
          description: Current draft (Flow-File-Format.md flow document).
        deployedVersion:
          type: integer
          nullable: true
        logLevel:
          type: string
          enum: [debug, info, warn, error]
          description: OBS-120 per-flow log level; see PATCH /flows/{flowId}/log-level.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FlowVersion:
      type: object
      description: Immutable once created (VCS-110).
      properties:
        flowId: { type: string }
        version: { type: integer }
        content: { type: object }
        author: { type: string }
        comment: { type: string }
        createdAt: { type: string, format: date-time }
        deployedAt: { type: string, format: date-time, nullable: true }

    Connection:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        name: { type: string }
        type: { type: string }
        config: { type: object }
        credentialId: { type: string, nullable: true }

    CredentialMeta:
      type: object
      description: Never carries the secret value (SEC-120).
      properties:
        id: { type: string }
        projectId: { type: string }
        name: { type: string }
        createdAt: { type: string, format: date-time }

    Runtime:
      type: object
      properties:
        runtimeId: { type: string }
        kind: { type: string, enum: [server, edge] }
        version: { type: string }
        lastSeen: { type: string, format: date-time }
        online: { type: boolean, description: "Currently connected (has an open DeployStream)" }
        cpuPercent: { type: number, nullable: true }
        memoryBytes: { type: integer, format: int64, nullable: true }
        flowCount: { type: integer, description: "Number of flows the runtime last reported as deployed" }
        displayName: { type: string, nullable: true }
        group: { type: string, nullable: true, description: "Fleet runtime group name, or null if unassigned" }
        enrolled: { type: boolean, description: "True if this runtime was registered with a valid enrollment token" }

    RuntimeGroup:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }

    RuntimeEnrollToken:
      type: object
      description: Never carries the plaintext token except in the POST response that creates it.
      properties:
        id: { type: string }
        displayName: { type: string, nullable: true }
        group: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        usedByRuntimeId: { type: string, nullable: true }
        revoked: { type: boolean }

    AlertRule:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        metric: { type: string, enum: [connectionDown, edgeOffline] }
        targetRuntimeId: { type: string, nullable: true }
        webhookUrl: { type: string, nullable: true }
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }

    Alert:
      type: object
      properties:
        id: { type: string }
        ruleId: { type: string }
        ruleName: { type: string }
        state: { type: string, enum: [firing, resolved] }
        message: { type: string }
        firedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }

    BackupBundle:
      type: object
      description: >
        OBS-150's exportable/restorable configuration snapshot. Field
        shapes below mirror the underlying tables directly (snake_case DB
        columns, camelCase JSON) rather than the friendlier per-resource
        schemas elsewhere in this document, since a bundle is meant to be
        opaque round-trip data (export it, store it, restore it) rather
        than something a client constructs field-by-field.
      properties:
        formatVersion: { type: integer }
        exportedAt: { type: string, format: date-time }
        users: { type: array, items: { type: object } }
        projects: { type: array, items: { type: object } }
        projectMembers: { type: array, items: { type: object } }
        flows: { type: array, items: { type: object } }
        flowVersions: { type: array, items: { type: object } }
        connections: { type: array, items: { type: object } }
        credentials: { type: array, items: { type: object }, description: "Sealed (SEC-120 envelope-encrypted) fields only — never a decrypted value" }
        runtimeGroups: { type: array, items: { type: object } }
        runtimeEnrollTokens: { type: array, items: { type: object } }
        devices: { type: array, items: { type: object } }
        alertRules: { type: array, items: { type: object } }

    AuditEntry:
      type: object
      properties:
        id: { type: integer }
        at: { type: string, format: date-time }
        actorUserId: { type: string }
        action: { type: string }
        objectType: { type: string }
        objectId: { type: string }
        hash:
          type: string
          description: sha256(prevHash || canonical(entry)) — tamper-evident chain (SEC-140).

    NodeType:
      type: object
      properties:
        type: { type: string, description: "e.g. \"inject\", \"set\", \"debug-log\"" }
        displayName: { type: string }
        category: { type: string, enum: [source, processor, sink, control] }
        description: { type: string }
        kind: { type: string, enum: [source, processor] }
        trigger:
          type: boolean
          description: Source node types only — true for trigger nodes (ENG-100), whose flows are "triggered" mode and produce tracked executions (ENG-130/DBG-140) rather than an always-on stream.
        inputs: { type: array, items: { type: string } }
        outputs: { type: array, items: { type: string } }
        configSchema:
          type: object
          description: A JSON Schema for this type's "config" object; the editor generates its config form from this.

    ExecuteNodeResult:
      type: object
      properties:
        outputs:
          type: array
          items:
            type: object
            properties:
              port: { type: string }
              datagram: { type: object }
        error:
          type: string
          nullable: true

    ConnectionTestResult:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }

    PreviewResult:
      type: object
      properties:
        records:
          type: array
          items:
            type: object
            properties:
              port: { type: string }
              datagram: { type: object }
        error:
          type: string
          nullable: true

    DebugPin:
      type: object
      properties:
        flowId: { type: string }
        nodeId: { type: string }
        port: { type: string }
        value: {}

    AsyncAccepted:
      type: object
      properties:
        accepted: { type: boolean }

    ExecutionStatus:
      type: string
      description: ENG-130's durable status enum, plus "crashed" (ERR-150 — a runtime disconnected mid-run).
      enum: [running, waiting, success, failed, cancelled, crashed]

    Execution:
      type: object
      properties:
        id: { type: string, description: Equals the root datagram's correlationId (DGM-160). }
        flowId: { type: string }
        runtimeId: { type: string }
        status: { $ref: "#/components/schemas/ExecutionStatus" }
        triggerNodeId: { type: string }
        triggerKind: { type: string, description: "e.g. \"webhook\", \"rerun\"" }
        reRunOf: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time, nullable: true }
        durationMs: { type: integer, nullable: true }
        reason: { type: string, description: Set on failed/cancelled/crashed (e.g. the terminal node error message, "timeout", "cancelled", "runtime disconnected"). }

    ExecutionDetail:
      allOf:
        - $ref: "#/components/schemas/Execution"
        - type: object
          properties:
            nodeIO:
              type: array
              items: { $ref: "#/components/schemas/ExecutionNodeIO" }

    ExecutionNodeIO:
      type: object
      properties:
        nodeId: { type: string }
        port: { type: string }
        attempt: { type: integer }
        at: { type: string, format: date-time }
        durationUs: { type: integer }
        input: { type: object }
        outputs:
          type: array
          items:
            type: object
            properties:
              port: { type: string }
              datagram: { type: object }
        error:
          type: object
          nullable: true
          properties:
            message: { type: string }
            code: { type: string }
            stack: { type: string }

    DeadLetter:
      type: object
      properties:
        id: { type: string }
        flowId: { type: string }
        nodeId: { type: string }
        port: { type: string }
        reason: { type: string, description: "e.g. \"node_error\", \"ttl_expired\"" }
        datagram: { type: object }
        createdAt: { type: string, format: date-time }
        reinjectedAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time }
